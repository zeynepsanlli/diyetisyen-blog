<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diyetisyen Beyzanur Narbay</title>
    <script>
      ;(() => {
        const basePath = '/diyetisyen-blog'
        const path = window.location.pathname.startsWith(basePath)
          ? window.location.pathname.slice(basePath.length)
          : '/'
        const redirectPath = `${path || '/'}${window.location.search}${window.location.hash}`

        window.location.replace(
          `${basePath}/?redirect=${encodeURIComponent(redirectPath)}`,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
